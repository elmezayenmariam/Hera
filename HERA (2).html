<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERA — Heritage Risk Assessment Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d0f; --bg2:#161618; --bg3:#1e1e21;
    --purple:#8b5cf6; --purple2:#a78bfa; --purple-dark:#6d28d9;
    --text:#f5f5f7; --muted:#9a9aa2; --border:#2a2a2e;
    --good:#34d399; --low:#a78bfa; --mod:#fbbf24; --high:#fb923c; --crit:#f87171;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.brand{font-family:'Poppins',sans-serif;}
  .app{max-width:1100px; margin:0 auto; padding:32px 24px 80px;}

  /* HEADER */
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:36px;}
  .brand{font-weight:800; font-size:22px; display:flex; align-items:center; gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--purple);box-shadow:0 0 12px var(--purple);}
  .brand small{display:block; font-family:'Inter'; font-weight:400; color:var(--muted); font-size:11px; letter-spacing:.5px;}

  /* STEPPER */
  .stepper{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;}
  .step-pill{
    flex:1; min-width:90px; text-align:center; padding:8px 6px; border-radius:8px;
    font-size:11px; font-weight:600; letter-spacing:.3px; color:var(--muted);
    background:var(--bg2); border:1px solid var(--border); cursor:pointer; transition:.15s;
  }
  .step-pill.active{background:var(--purple); color:#fff; border-color:var(--purple);}
  .step-pill.done{color:var(--purple2); border-color:var(--purple-dark);}

  /* CARD */
  .card{
    background:var(--bg2); border:1px solid var(--border); border-radius:16px;
    padding:32px; margin-top:24px;
  }
  .card h2{font-size:24px; font-weight:700; margin-bottom:4px;}
  .card .sub{color:var(--muted); font-size:14px; margin-bottom:24px;}
  .accentbar{width:48px; height:4px; background:var(--purple); border-radius:2px; margin-bottom:16px;}

  /* FORM */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:18px;}
  .field label{font-size:13px; font-weight:600; color:var(--text);}
  .field .hint{font-size:11px; color:var(--muted);}
  input[type=text], input[type=number], select{
    background:var(--bg3); border:1px solid var(--border); color:var(--text);
    padding:11px 12px; border-radius:8px; font-size:14px; font-family:'Inter';
    outline:none; transition:.15s;
  }
  input:focus, select:focus{border-color:var(--purple);}
  .indicator-block{
    background:var(--bg3); border:1px solid var(--border); border-radius:12px;
    padding:18px 20px; margin-bottom:16px;
  }
  .indicator-block .ihead{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px;}
  .indicator-block .iname{font-weight:600; font-size:14px;}
  .indicator-block .iweight{font-size:11px; color:var(--purple2); background:rgba(139,92,246,.12); padding:2px 8px; border-radius:20px;}
  .badge-row{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;}
  .badge{font-size:10px; padding:3px 8px; border-radius:20px; border:1px solid var(--border); color:var(--muted);}

  /* BUTTONS */
  .navrow{display:flex; justify-content:space-between; margin-top:32px;}
  button{
    font-family:'Inter'; font-weight:600; font-size:14px; cursor:pointer;
    border-radius:9px; padding:12px 22px; border:1px solid var(--border);
    background:var(--bg3); color:var(--text); transition:.15s;
  }
  button.primary{background:var(--purple); border-color:var(--purple); color:#fff;}
  button.primary:hover{background:var(--purple-dark);}
  button:hover{border-color:var(--purple2);}
  button:disabled{opacity:.35; cursor:not-allowed;}
  button.ghost{background:transparent;}

  /* HOME */
  .hero{text-align:center; padding:60px 20px 40px;}
  .hero h1{font-size:42px; font-weight:800; margin-bottom:14px; letter-spacing:-1px;}
  .hero p{color:var(--muted); font-size:16px; max-width:560px; margin:0 auto 28px; line-height:1.6;}
  .pillar-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:40px;}
  .pillar{background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:22px; text-align:left;}
  .pillar .pnum{color:var(--purple2); font-weight:800; font-size:13px; margin-bottom:8px;}
  .pillar h3{font-size:15px; margin-bottom:6px;}
  .pillar p{font-size:12.5px; color:var(--muted); line-height:1.5;}

  /* GAUGE */
  .gauge-wrap{display:flex; flex-direction:column; align-items:center; padding:10px 0 0;}
  .gauge-score{font-size:42px; font-weight:800; margin-top:-58px;}
  .gauge-label{font-size:13px; font-weight:600; padding:4px 14px; border-radius:20px; margin-top:6px;}

  /* RESULTS */
  .score-row{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin:20px 0 8px;}
  .score-card{background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:18px; text-align:center;}
  .score-card .label{font-size:11px; color:var(--muted); letter-spacing:.5px; margin-bottom:6px;}
  .score-card .val{font-size:30px; font-weight:800;}
  .score-card .cls{font-size:11px; margin-top:4px; font-weight:600;}
  .barwrap{background:var(--bg3); border-radius:8px; height:8px; overflow:hidden; margin-top:8px;}
  .barfill{height:100%; border-radius:8px;}

  .hri-banner{
    background:linear-gradient(135deg, rgba(139,92,246,.18), rgba(139,92,246,.04));
    border:1px solid var(--purple-dark); border-radius:14px; padding:24px; margin-top:24px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;
  }
  .hri-banner .big{font-size:46px; font-weight:800;}
  .hri-banner .tag{font-size:13px; font-weight:700; padding:6px 14px; border-radius:20px; display:inline-block;}

  .scenario-tabs{display:flex; gap:8px; margin-bottom:20px;}
  .scenario-tab{padding:10px 16px; border-radius:9px; border:1px solid var(--border); background:var(--bg3); cursor:pointer; font-size:13px; font-weight:600;}
  .scenario-tab.active{background:var(--purple); border-color:var(--purple); color:#fff;}

  .note{background:rgba(167,139,250,.08); border:1px solid var(--purple-dark); border-radius:10px; padding:14px 16px; font-size:12.5px; color:var(--purple2); line-height:1.6; margin:18px 0;}
  .note b{color:#fff;}

  .compare-table{width:100%; border-collapse:collapse; margin-top:10px; font-size:13px;}
  .compare-table th, .compare-table td{padding:10px 12px; border-bottom:1px solid var(--border); text-align:center;}
  .compare-table th{color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.4px;}
  .compare-table td:first-child, .compare-table th:first-child{text-align:left;}

  .strategy-box{background:var(--bg3); border-left:3px solid var(--purple); border-radius:0 10px 10px 0; padding:18px 20px; margin-top:18px;}
  .strategy-box .cat{font-size:11px; color:var(--purple2); font-weight:700; letter-spacing:.4px; text-transform:uppercase; margin-bottom:6px;}
  .strategy-box .driver{font-size:12px; color:var(--muted); margin-bottom:10px;}
  .strategy-box p{font-size:14px; line-height:1.6;}

  .future-block{margin-top:32px; padding-top:24px; border-top:1px dashed var(--border);}
  .phase2{background:var(--bg3); border:1px dashed var(--border); border-radius:12px; padding:18px 20px; margin-top:24px; text-align:center; color:var(--muted); font-size:13px;}
  .phase2 b{color:var(--text);}

  select.iselect{width:100%;}
  .twocol{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:700px){.grid,.pillar-grid,.score-row,.twocol{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ============================== DATA & FORMULAS ============================== */
/* Sourced directly from: Mariam Elmezayen's MSc Thesis Proposal — */
/* "An AI-Assisted Heritage Risk Assessment and Decision-Support Framework", GIU 2026 */

const BANDS_GENERIC = [ // ESS / OIS / HRI classification
  {min:0,max:20,label:'Very Low'},
  {min:21,max:40,label:'Low'},
  {min:41,max:60,label:'Moderate'},
  {min:61,max:80,label:'High'},
  {min:81,max:100,label:'Severe'}
];
const BANDS_BCS = [
  {min:0,max:20,label:'Excellent'},
  {min:21,max:40,label:'Good'},
  {min:41,max:60,label:'Fair'},
  {min:61,max:80,label:'Poor'},
  {min:81,max:100,label:'Critical'}
];
const HRI_TABLE = [
  {min:0,max:20,label:'Very Low',priority:'Routine Monitoring'},
  {min:21,max:40,label:'Low',priority:'Scheduled Maintenance'},
  {min:41,max:60,label:'Moderate',priority:'Preventive Conservation'},
  {min:61,max:80,label:'High',priority:'Conservation Upgrade'},
  {min:81,max:100,label:'Critical',priority:'Immediate Intervention'}
];

function classify(score, table){
  for(const b of table){ if(score>=b.min && score<=b.max) return b; }
  return table[table.length-1];
}
function bandColor(label){
  const map = {'Very Low':'var(--good)','Excellent':'var(--good)','Low':'var(--low)','Good':'var(--low)',
    'Moderate':'var(--mod)','Fair':'var(--mod)','High':'var(--high)','Poor':'var(--high)',
    'Severe':'var(--crit)','Critical':'var(--crit)'};
  return map[label] || 'var(--purple)';
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(x,x0,x1,y0,y1){ if(x1===x0) return y0; const t=clamp((x-x0)/(x1-x0),0,1); return y0+t*(y1-y0); }

// piecewise scoring across breakpoints [[x,score],...]
function piecewise(x, pts){
  if(x<=pts[0][0]) return pts[0][1];
  for(let i=0;i<pts.length-1;i++){
    const [x0,y0]=pts[i], [x1,y1]=pts[i+1];
    if(x<=x1) return lerp(x,x0,x1,y0,y1);
  }
  return pts[pts.length-1][1];
}

/* ---------- ESS scoring (Table 6/7.3/8.6) ---------- */
function scoreTemperature(tempC){ // indoor temp °C, optimal 20-24, acceptable 18-27
  return piecewise(Math.abs(tempC-22), [[2,10],[5,40],[7,70],[12,100]]);
}
function scoreHumidity(rh){ // %, optimal 40-60, acceptable 30-70
  return piecewise(Math.abs(rh-50), [[10,10],[20,40],[30,70],[45,100]]);
}
function scoreSolar(wm2){ // W/m², optimal <200, acceptable 200-500, critical >500
  return piecewise(wm2, [[200,10],[350,35],[500,70],[900,100]]);
}
function computeESS(i){
  const t=scoreTemperature(i.temp), h=scoreHumidity(i.rh), s=scoreSolar(i.solar);
  return {score: (t+h+s)/3, parts:{Temperature:t,Humidity:h,Solar:s}};
}

/* ---------- BCS scoring (Table 10/11/12) ---------- */
const CAT_SCORE = {None:5, Minor:35, Limited:35, Moderate:65, Severe:95};
function scoreCrack(mm){ return piecewise(mm, [[1,10],[3,45],[5,75],[9,100]]); }
function scoreSurfaceLoss(pct){ return piecewise(pct, [[5,10],[15,45],[30,75],[55,100]]); }
function computeBCS(i){
  const md=CAT_SCORE[i.materialDecay], cr=scoreCrack(i.crack), sl=scoreSurfaceLoss(i.surfaceLoss), bg=CAT_SCORE[i.bioGrowth];
  return {score: md*0.40 + cr*0.30 + sl*0.20 + bg*0.10, parts:{MaterialDecay:md,Cracking:cr,SurfaceLoss:sl,BiologicalGrowth:bg}};
}

/* ---------- OIS scoring (Table 14/15/16) ---------- */
function scoreDensity(p){ return piecewise(p, [[1,10],[2,45],[3,75],[5,100]]); }
function computeOIS(i){
  const d=scoreDensity(i.density), v=CAT_SCORE_OIS(i.visitorLoad), e=CAT_SCORE_OIS(i.eventFreq);
  return {score:(d+v+e)/3, parts:{OccupancyDensity:d,VisitorLoad:v,EventFrequency:e}};
}
function CAT_SCORE_OIS(level){ return {Low:10,Monthly:10,Medium:40,Weekly:40,High:70,'Several/week':70,Excessive:95,Daily:95}[level]; }

/* ---------- HRI ---------- */
function computeHRI(ess,bcs,ois){ return 0.40*ess + 0.40*bcs + 0.20*ois; }

/* ---------- Climate Scenario Engine ----------
   No fixed formula exists in the proposal for translating SSP pathways into
   projected ESS/BCS — this is an explicit open question in the methodology.
   This prototype implements one transparent, documented approach:
   1) Apply IPCC AR6 temperature deltas to the raw environmental indicators
      (temperature shifts directly; humidity assumed to fall with regional
      aridification; solar exposure assumed to rise slightly with warming).
   2) Recompute ESS from the shifted indicators.
   3) Project BCS forward using a deterioration-acceleration coefficient (k),
      reflecting environmental stress (hazard) as the primary driver of
      material vulnerability realization, per the framework's theoretical basis.
   4) OIS is treated as non-climatic and held constant, consistent with the
      proposal's own worked example (Slide 29).
   k and the indicator-shift assumptions are adjustable constants below —
   flagged for expert/supervisor validation.
------------------------------------------------------------------------- */
const SSP = {
  current: {label:'Current Conditions', dT:0, dRH:0, dSolarPct:0},
  ssp245:  {label:'SSP2-4.5 (Moderate)', dT:2.7, dRH:-6, dSolarPct:8},
  ssp585:  {label:'SSP5-8.5 (Severe)',   dT:4.4, dRH:-10, dSolarPct:14}
};
const BCS_ACCELERATION_K = 0.75; // deterioration sensitivity to ESS increase

function projectScenario(rawESS, currentESSResult, currentBCSscore, scenarioKey){
  const s = SSP[scenarioKey];
  const projTemp = rawESS.temp + s.dT;
  const projRH = clamp(rawESS.rh + s.dRH, 0, 100);
  const projSolar = rawESS.solar * (1 + s.dSolarPct/100);
  const ess2 = computeESS({temp:projTemp, rh:projRH, solar:projSolar});
  const deltaESS = ess2.score - currentESSResult.score;
  const bcs2 = clamp(currentBCSscore + deltaESS * BCS_ACCELERATION_K, 0, 100);
  return {ess: ess2.score, bcs: bcs2, indicators:{projTemp,projRH,projSolar}};
}

/* ---------- Rule-Based Expert Conservation Strategy Matrix (Table 23) ---------- */
const STRATEGY_MATRIX = {
'Routine Monitoring|ESS':'Periodic environmental monitoring, temperature and humidity tracking, and routine inspections.',
'Routine Monitoring|BCS':'Scheduled condition surveys and photographic documentation of existing defects.',
'Routine Monitoring|OIS':'Monitoring visitor numbers and occupancy patterns to detect changes in use intensity.',
'Scheduled Maintenance|ESS':'Improve environmental management through shading, ventilation optimization, and moisture control measures.',
'Scheduled Maintenance|BCS':'Minor repairs, cleaning, biological growth removal, repointing, and preventive maintenance works.',
'Scheduled Maintenance|OIS':'Visitor flow management and maintenance scheduling during low-occupancy periods.',
'Preventive Conservation|ESS':'Strengthen environmental controls, improve drainage systems, install passive climate adaptation measures, and increase monitoring frequency.',
'Preventive Conservation|BCS':'Address early-stage material decay, repair localized cracks, stabilize vulnerable elements, and implement preventive conservation treatments.',
'Preventive Conservation|OIS':'Introduce occupancy limits, regulate visitor circulation routes, and reduce operational pressures on sensitive spaces.',
'Preventive Conservation|ESS+BCS':'Combine climate adaptation measures with targeted conservation interventions to reduce future deterioration risks.',
'Conservation Upgrade|ESS':'Implement climate adaptation measures such as solar protection systems, environmental buffering, moisture management strategies, and enhanced monitoring systems.',
'Conservation Upgrade|BCS':'Material consolidation, crack repair, surface conservation, replacement of incompatible repair materials, and restoration of deteriorated building elements.',
'Conservation Upgrade|OIS':'Occupancy control measures, visitor capacity restrictions, operational management plans, and event scheduling controls.',
'Conservation Upgrade|ESS+BCS':'Integrated climate adaptation and conservation programme including environmental mitigation and building repair works.',
'Conservation Upgrade|BCS+OIS':'Comprehensive conservation works combined with adaptive reuse management strategies and occupancy controls.',
'Immediate Intervention|ESS':'Emergency climate adaptation measures to protect vulnerable building elements from severe environmental stress.',
'Immediate Intervention|BCS':'Emergency stabilization, structural protection measures, urgent repair works, and protection of highly deteriorated fabric.',
'Immediate Intervention|OIS':'Immediate occupancy restrictions, closure of vulnerable areas, and emergency visitor management protocols.',
'Immediate Intervention|ESS+BCS':'Emergency conservation programme addressing both severe environmental stress and advanced material deterioration.',
'Immediate Intervention|ESS+BCS+OIS':'Comprehensive emergency intervention combining climate adaptation, conservation works, structural protection measures, and occupancy restrictions.'
};

function dominantDrivers(ess,bcs,ois){
  const vals = {ESS:ess, BCS:bcs, OIS:ois};
  const max = Math.max(ess,bcs,ois);
  let drivers = Object.keys(vals).filter(k => vals[k] >= max - 8 && vals[k] >= 41);
  if(drivers.length===0) drivers = [Object.keys(vals).reduce((a,b)=>vals[a]>vals[b]?a:b)];
  const order = {ESS:0,BCS:1,OIS:2};
  drivers.sort((a,b)=>order[a]-order[b]);
  return drivers;
}
function getStrategy(category, drivers){
  const key = category + '|' + drivers.join('+');
  if(STRATEGY_MATRIX[key]) return {key, text:STRATEGY_MATRIX[key]};
  // fallback: combine individual strategies
  const texts = drivers.map(d => STRATEGY_MATRIX[category+'|'+d]).filter(Boolean);
  return {key:category+'|'+drivers.join('+')+' (combined)', text: texts.join(' ')};
}

function getCategoryLabel(catScoreKey, val){
  // helper to find original category label from score for display
  return val;
}

function buildPrompt(scenarioKey){
  const essR = computeESS(state.ess), bcsR = computeBCS(state.bcs), oisR = computeOIS(state.ois);
  const hriCurrent = computeHRI(essR.score, bcsR.score, oisR.score);
  let ess=essR.score, bcs=bcsR.score, ois=oisR.score, hri=hriCurrent, scenarioLabel='Current Conditions', dT=0;

  if(scenarioKey!=='current'){
    const proj = projectScenario(state.ess, essR, bcsR.score, scenarioKey);
    ess = proj.ess; bcs = proj.bcs; ois = oisR.score;
    hri = computeHRI(ess, bcs, ois);
    scenarioLabel = SSP[scenarioKey].label;
    dT = SSP[scenarioKey].dT;
  }
  const hriCls = classify(hri, HRI_TABLE);
  const essCls = classify(ess, BANDS_GENERIC);
  const bcsCls = classify(bcs, BANDS_BCS);
  const oisCls = classify(ois, BANDS_GENERIC);
  const drivers = dominantDrivers(ess, bcs, ois);
  const strat = getStrategy(hriCls.priority, drivers);
  const b = state.building;
  const bi = state.bcs, oi = state.ois;

  return `You are an expert heritage conservation advisor. Generate a tailored, evidence-based conservation strategy for the adaptive reuse heritage building described below, following the principles of minimal intervention, reversibility, and respect for cultural significance (UNESCO and ICOMOS conservation doctrine).

=== CASE STUDY ===
Building: ${b.name}
Location: ${b.location}
Building category: ${b.category||'—'}
Construction year: ${b.year||'—'}
Construction era: ${b.era}
Construction material: ${b.material||'—'}
Current use: ${b.use}
Current occupancy: ${b.occupancy||'—'}
Typology: Late Khedival/Colonial-era load-bearing masonry construction (1880-1940) — limestone ashlar, lime mortars, terracotta ornament.

=== CLIMATE SCENARIO EVALUATED ===
Scenario: ${scenarioLabel}${scenarioKey!=='current' ? ` (IPCC AR6 projected temperature increase: +${dT}\u00b0C by 2100)` : ' (present-day baseline)'}

=== HERITAGE RISK ASSESSMENT RESULTS ===
Environmental Stress Score (ESS): ${ess.toFixed(1)}/100 — ${essCls.label} (Hazard)
  - Temperature indicator: input ${state.ess.temp}\u00b0C, score ${essR.parts.Temperature.toFixed(1)}
  - Relative Humidity indicator: input ${state.ess.rh}%, score ${essR.parts.Humidity.toFixed(1)}
  - Solar Radiation indicator: input ${state.ess.solar} W/m\u00b2, score ${essR.parts.Solar.toFixed(1)}

Building Condition Score (BCS): ${bcs.toFixed(1)}/100 — ${bcsCls.label} (Vulnerability)
  - Material Decay: ${bi.materialDecay}, score ${bcsR.parts.MaterialDecay.toFixed(1)} (weight 40%)
  - Cracking: ${bi.crack} mm, score ${bcsR.parts.Cracking.toFixed(1)} (weight 30%)
  - Surface Loss: ${bi.surfaceLoss}%, score ${bcsR.parts.SurfaceLoss.toFixed(1)} (weight 20%)
  - Biological Growth: ${bi.bioGrowth}, score ${bcsR.parts.BiologicalGrowth.toFixed(1)} (weight 10%)

Occupancy Impact Score (OIS): ${ois.toFixed(1)}/100 — ${oisCls.label} (Exposure)
  - Occupancy Density: ${oi.density} persons/m\u00b2, score ${oisR.parts.OccupancyDensity.toFixed(1)}
  - Visitor Load: ${oi.visitorLoad}, score ${oisR.parts.VisitorLoad.toFixed(1)}
  - Event Frequency: ${oi.eventFreq}, score ${oisR.parts.EventFrequency.toFixed(1)}

Heritage Risk Index (HRI) = 0.40\u00d7ESS + 0.40\u00d7BCS + 0.20\u00d7OIS = ${hri.toFixed(1)}/100
Risk Classification: ${hriCls.label}
Conservation Priority Category: ${hriCls.priority}
Dominant Risk Driver(s): ${drivers.join(' + ')}

=== RULE-BASED BASELINE STRATEGY (Expert Layer output) ===
${strat.text}

=== YOUR TASK ===
Using only the assessment data above and established heritage conservation literature (UNESCO Managing Cultural World Heritage; World Heritage Resource Manual; ICOMOS charters and climate change adaptation guidance; published restoration practice for Egyptian Khedival/Colonial-era masonry buildings), expand the rule-based baseline strategy above into a conservation action plan tailored specifically to this building's actual indicator readings — not generic advice.

Your response must:
1. Explain why each recommendation responds to the specific dominant risk driver(s) and indicator values reported above.
2. Stay within the rule-based baseline conservation priority category (${hriCls.priority}) — do not recommend interventions from a different response tier without explicit justification.
3. Respect minimal-intervention and reversibility principles; avoid treatments incompatible with historic masonry, lime mortars, or terracotta ornament.
4. Be structured under these headings:
   - Immediate Actions
   - Preventive Measures
   - Climate Adaptation Measures
   - Monitoring Plan
   - Maintenance Schedule
   - References / Precedents drawn upon
5. For each recommendation, cite the type of source supporting it (e.g. "per ICOMOS climate adaptation guidance" or "per UNESCO preventive conservation principles") rather than inventing specific page numbers or quotations.`;
}

function copyPrompt(scenarioKey){
  const text = buildPrompt(scenarioKey);
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){ const old = btn.innerText; btn.innerText = '✓ Copied'; setTimeout(()=>btn.innerText=old, 1500); }
  });
}

function blankBuilding(){
  return {name:'Baron Palace', location:'Heliopolis, Cairo, Egypt', year:1907, category:'Palace',
    era:eraFromYear(1907), material:'Limestone', use:'Cultural Center', occupancy:''};
}

function eraFromYear(year){
  const y = parseInt(year);
  if(!y) return '';
  if(y < 1880) return 'Pre-1880';
  if(y <= 1940) return '1880–1940 (Khedival/Colonial)';
  return 'Post-1940';
}

const state = {
  step: 0,
  building: blankBuilding(),
  ess: {temp:24, rh:55, solar:300},

/* ============================== RENDER HELPERS ============================== */
function gauge(score, label, size=160){
  const r = size/2 - 14;
  const c = size/2;
  const circumference = Math.PI * r;
  const offset = circumference * (1 - score/100);
  const color = bandColor(label);
  return `
  <div class="gauge-wrap">
    <svg width="${size}" height="${size/2+20}" viewBox="0 0 ${size} ${size/2+20}">
      <path d="M14,${size/2} A${r},${r} 0 0 1 ${size-14},${size/2}" fill="none" stroke="var(--bg3)" stroke-width="14" stroke-linecap="round"/>
      <path d="M14,${size/2} A${r},${r} 0 0 1 ${size-14},${size/2}" fill="none" stroke="${color}" stroke-width="14" stroke-linecap="round"
        stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
    </svg>
    <div class="gauge-score">${score.toFixed(1)}</div>
    <div class="gauge-label" style="color:${color};background:${color}22;">${label}</div>
  </div>`;
}

function barRow(name, val, weightLabel){
  const cls = classify(val, BANDS_GENERIC);
  const color = bandColor(cls.label);
  return `<div style="margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
      <span>${name}</span><span style="color:var(--muted)">${weightLabel||''} · ${val.toFixed(1)}</span>
    </div>
    <div class="barwrap"><div class="barfill" style="width:${val}%;background:${color};"></div></div>
  </div>`;
}

function stepperHTML(){
  return `<div class="stepper">${STEPS.map((s,i)=>`
    <div class="step-pill ${i===state.step?'active':(i<state.step?'done':'')}" onclick="go(${i})">${i}. ${s}</div>
  `).join('')}</div>`;
}

function newAssessment(){
  state.building = blankBuilding();

  state.ois = {density:1.5, visitorLoad:'Medium', eventFreq:'Weekly'};
  state.scenario = 'current';
  state.editingProjectId = null;
  state.compareView = false;
  go(1);
}

function saveCurrentProject(){
  const essR = computeESS(state.ess), bcsR = computeBCS(state.bcs), oisR = computeOIS(state.ois);
  const hri = computeHRI(essR.score, bcsR.score, oisR.score);
  const cls = classify(hri, HRI_TABLE);
  const id = state.editingProjectId || ('p'+Date.now());
  const snapshot = {
    id,
    building: JSON.parse(JSON.stringify(state.building)),
    ess: JSON.parse(JSON.stringify(state.ess)),
    bcs: JSON.parse(JSON.stringify(state.bcs)),
    ois: JSON.parse(JSON.stringify(state.ois)),
    ess_score: essR.score, bcs_score: bcsR.score, ois_score: oisR.score,
    hri, band: cls.label, priority: cls.priority
  };
  const idx = state.projects.findIndex(p=>p.id===id);
  if(idx>=0) state.projects[idx] = snapshot; else state.projects.push(snapshot);
  state.editingProjectId = id;
  render();
}

function loadProject(id){
  const p = state.projects.find(p=>p.id===id);
  if(!p) return;
  state.building = JSON.parse(JSON.stringify(p.building));
  state.ess = JSON.parse(JSON.stringify(p.ess));
  state.bcs = JSON.parse(JSON.stringify(p.bcs));
  state.ois = JSON.parse(JSON.stringify(p.ois));
  state.editingProjectId = id;
  state.compareView = false;
  go(5);
}

function removeProject(id){
  state.projects = state.projects.filter(p=>p.id!==id);
  render();
}

function pageClimate(){
  const essR = computeESS(state.ess), bcsR = computeBCS(state.bcs), oisR = computeOIS(state.ois);
  const hriCurrent = computeHRI(essR.score, bcsR.score, oisR.score);

  const proj245 = projectScenario(state.ess, essR, bcsR.score, 'ssp245');
  const proj585 = projectScenario(state.ess, essR, bcsR.score, 'ssp585');
  const hri245 = computeHRI(proj245.ess, proj245.bcs, oisR.score);
  const hri585 = computeHRI(proj585.ess, proj585.bcs, oisR.score);

  const scenarios = {
    current: {label:'Current Conditions', ess:essR.score, bcs:bcsR.score, ois:oisR.score, hri:hriCurrent},
    ssp245:  {label:'SSP2-4.5 (Moderate)', ess:proj245.ess, bcs:proj245.bcs, ois:oisR.score, hri:hri245},
    ssp585:  {label:'SSP5-8.5 (Severe)',   ess:proj585.ess, bcs:proj585.bcs, ois:oisR.score, hri:hri585}
  };
  const sel = scenarios[state.scenario];
  const selCls = classify(sel.hri, HRI_TABLE);
  const drivers = dominantDrivers(sel.ess, sel.bcs, sel.ois);
  const strat = getStrategy(selCls.priority, drivers);

  return `<div class="card">
    <div class="accentbar"></div>
    <h2>Climate Scenario Engine & Decision Matrix</h2>
    <div class="sub">IPCC AR6 SSP pathways projected onto Current HRI to generate the Future HRI.</div>

    <div class="note"><b>Methodology note:</b> No closed-form rule exists in the source framework for projecting ESS/BCS under SSP scenarios — this prototype applies IPCC AR6 temperature deltas to the raw environmental indicators (ΔT: SSP2-4.5 +2.7°C, SSP5-8.5 +4.4°C by 2100; humidity assumed to fall with regional aridification; solar exposure assumed to rise slightly), recomputes ESS, then projects BCS forward using a deterioration-acceleration coefficient (k=${BCS_ACCELERATION_K}) linking environmental stress increase to material vulnerability. OIS is held constant (non-climatic). <b>Flagged for supervisor validation/calibration.</b></div>

    <div class="scenario-tabs">
      ${Object.keys(scenarios).map(k=>`<div class="scenario-tab ${state.scenario===k?'active':''}" onclick="state.scenario='${k}';render()">${scenarios[k].label}</div>`).join('')}
    </div>

    <table class="compare-table">
      <thead><tr><th>Scenario</th><th>ESS</th><th>BCS</th><th>OIS</th><th>HRI</th><th>Risk</th></tr></thead>
      <tbody>
        ${Object.keys(scenarios).map(k=>{
          const s = scenarios[k]; const c = classify(s.hri, HRI_TABLE);
          return `<tr style="${state.scenario===k?'background:rgba(139,92,246,.08)':''}">
            <td>${s.label}</td><td>${s.ess.toFixed(1)}</td><td>${s.bcs.toFixed(1)}</td><td>${s.ois.toFixed(1)}</td>
            <td><b>${s.hri.toFixed(1)}</b></td><td style="color:${bandColor(c.label)}">${c.label}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <div class="future-block">
      <h2 style="font-size:18px;">Decision Matrix — ${sel.label}</h2>
      <div class="sub" style="margin-bottom:8px;">Dominant risk driver: <b style="color:#fff">${drivers.join(' + ')}</b></div>
      <div class="strategy-box">
        <div class="cat">${selCls.priority} · HRI ${sel.hri.toFixed(1)} (${selCls.label})</div>
        <div class="driver">Rule-based match: ${strat.key}</div>
        <p>${strat.text}</p>
      </div>
    </div>

    <div class="future-block">
      <h2 style="font-size:18px;">AI Prompt Generator</h2>
      <div class="sub" style="margin-bottom:8px;">Assembles the Decision Matrix output above into a complete, ready-to-paste prompt for Claude/ChatGPT (or your future RAG-grounded knowledge base) to generate the final tailored conservation strategy.</div>
      <button class="primary" onclick="state.showPrompt=!state.showPrompt;render()">${state.showPrompt ? 'Hide Prompt' : 'Generate Full AI Prompt →'}</button>
      ${state.showPrompt ? `
        <div style="margin-top:16px;">
          <textarea readonly style="width:100%;min-height:380px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',monospace;font-size:12px;line-height:1.6;padding:16px;white-space:pre-wrap;">${buildPrompt(state.scenario)}</textarea>

            <button id="copyBtn" class="primary" onclick="copyPrompt('${state.scenario}')">📋 Copy to Clipboard</button>
            <span style="font-size:12px;color:var(--muted);align-self:center;">Paste directly into Claude or ChatGPT to get the tailored strategy for ${sel.label}</span>
          </div>
        </div>` : ''}
    </div>

    <div class="phase2">🔜 <b>Milestone 2:</b> This generated prompt will be sent automatically to a RAG-grounded knowledge base (curated UNESCO/ICOMOS/Egyptian restoration literature) before reaching the AI — so recommendations are grounded in retrieved evidence, not just the model's general knowledge.</div>
  </div>${navRow(5,7)}`;
}

  const list = [...state.projects].sort((a,b)=>b.hri-a.hri);
  return `<div class="card">

        <tbody>
          ${list.map((p,i)=>{
            const color = bandColor(p.band);
            return `<tr style="${i===0?'background:rgba(248,113,113,.07)':''}">
              <td><b>${p.building.name}</b>${i===0?' <span class="badge" style="border-color:'+color+';color:'+color+';">⚠ Most Urgent</span>':''}<div style="font-size:11px;color:var(--muted);">${p.building.location}</div></td>
              <td>${p.building.use}</td>
              <td><b>${p.hri.toFixed(1)}</b></td>
              <td style="color:${color};font-weight:600;">${p.band}</td>
              <td style="font-size:12px;">${p.priority}</td>
              <td>
                <button style="padding:7px 10px;font-size:12px;" onclick="loadProject('${p.id}')">Open</button>
                <button style="padding:7px 10px;font-size:12px;" onclick="removeProject('${p.id}')">Remove</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>

      <div class="future-block">
        <h2 style="font-size:16px;">Relative Risk</h2>
        ${list.map(p=>barRow(p.building.name, p.hri, p.band)).join('')}
      </div>

      <div class="note"><b>How to read this:</b> Buildings are ranked by Heritage Risk Index (HRI), highest first. With limited resources, prioritize intervention on the building(s) at the top of the list — especially those flagged Critical or High Risk — before addressing lower-risk buildings.</div>

      <div class="navrow"><button class="primary" onclick="newAssessment()">+ Add Another Building</button></div>
    `}
  </div>`;
}

function navRow(prev, next){
  return `<div class="navrow">
    <button onclick="go(${prev})">← Back</button>
    ${next<=6 && next!==prev ? `<button class="primary" onclick="go(${next})">Continue →</button>` : `<button class="primary" onclick="go(0)">↻ Start New Assessment</button>`}
  </div>`;
}

/* ============================== ROUTER ============================== */
function render(){
  const pages = [pageHome, pageBuilding, pageESS, pageBCS, pageOIS, pageResults, pageClimate];
  const body = state.compareView ? pageCompare() : pages[state.step]();
  document.getElementById('app').innerHTML = header() + body;
}
render();
</script>
</body>
</html>
